<!doctype html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>বন্ধু ভাষা প্রোগ্রামিং</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="ide-container">
  <div class="ide-header">
    <div class="ide-logo-area">
      <div class="ide-logo-icon"><i class="fa-solid fa-user-group"></i></div>
      <div class="ide-logo-text">বন্ধু ভাষা প্রোগ্রামিং <span>v3.0</span></div>
    </div>
    <div class="ide-actions">
      <button class="header-btn btn-run-ide" onclick="runCode()" title="কোড রান করুন"><i class="fa-solid fa-play mr-1"></i></button>
      <button class="header-btn btn-delete-ide" onclick="clearCode()" title="কোড রিসেট করুন"><i class="fa-solid fa-trash-can"></i></button>
    </div>
  </div>
  
  <div class="ide-workspace">
    <div class="ide-editor-section">
      <div id="lineNumbers">১</div>
      <div class="code-container">
        <pre id="highlight"></pre>
        <textarea id="code" placeholder="এখানে বন্ধু ভাষার কোড লেখো..." oninput="updateEditor()" onscroll="syncScroll()" spellcheck="false"></textarea>
      </div>
    </div>
    
    <div class="ide-terminal-section">
      <div class="terminal-header">
        <div class="terminal-title"><i class="fa-solid fa-terminal mr-2"></i>আউটপুট টার্মিনাল</div>
        <div class="terminal-actions">
          <button class="terminal-btn" onclick="window.open('https://github.com/AnisurRahmanJU/BondhuLang/blob/main/README.md', '_blank')"><i class="fa-solid fa-book"></i> উদাহরণ</button>
          <button class="terminal-btn btn-clear" onclick="clearOutput()"><i class="fa-solid fa-eraser"></i> মুছুন</button>
        </div>
      </div>
      <pre id="output"></pre>
    </div>
  </div>
</div>

<div class="ide-footer">
  <a href="https://github.com/AnisurRahmanJU" target="_blank" style="text-decoration: none; color: inherit;"><div class="footer-left"><i class="fa-solid fa-user-tie mr-1"></i> Md. Anisur Rahman </div></a>
  
</div>

<script src="script.js"></script>
<script>
  function toBanglaNum(num) {
    const b = {'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯'};
    return num.toString().split('').map(d => b[d] || d).join('');
  }
  function updateEditor() {
    var c = document.getElementById("code");
    var ln = document.getElementById("lineNumbers");
    var l = c.value.split('\n').length;
    var n = "";
    for(var i=1; i<=l; i++) n += toBanglaNum(i) + "\n";
    ln.textContent = n;
    if(typeof highlightCode === "function") highlightCode();
    syncScroll();
  }
  function syncScroll() {
    var c = document.getElementById("code");
    document.getElementById("lineNumbers").scrollTop = c.scrollTop;
    document.getElementById("highlight").scrollTop = c.scrollTop;
    document.getElementById("highlight").scrollLeft = c.scrollLeft;
  }
  window.onload = updateEditor;
</script>
</body>
</html>
